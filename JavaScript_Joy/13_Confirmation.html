<body>

    <h1>
        Confirmation Dialog Box
    </h1>

    <script>
        var response = confirm ("Do you want to continue ?"); 
        if(response==true)
        {
            alert("User  want to continue ?");

        }
        else
        {
            alert("User don't want to continue ");
        }
    </script>
    
</body>
