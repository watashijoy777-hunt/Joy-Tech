<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>card design</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container mt-4">
        <div class="row">
            <div class="col-lg-4">
                <div class="card shadow-sm rounded-4 overflow-hidden">
                    <div class="position-relative">
                        <img src="images/hotl.avif" class="card-img-top"  alt="hotel image" style="height:200px;object-fit:cover">
                        <span class="position-absolute bottom-0 end-0 me-2 bg-primary text-white px-2 py-1 rounded-small fw-bold">3.8/5</span>
                    </div>
                    <div class="p-3">
                        <div class="d-felx justify-content-between align-items-start">
                            <h5 class="fw-bold mb-0">ESSOTTO RECREATION<br/>HUB</h5>
                            <div class="text-end">
                                <h5 class="fw-bold mb-0">₹391</h5>
                            </div>
                            <small class="text-muted">per night</small>
                        </div>
                    </div>
                    <p class="mt-2 mb-1 text-secondary">
                        KIADB export promotions<br/>
                        Industrial area
                        <span class="text-warning ms-2">&#9733;&#9733;&#9733;&#9733;</span>
                        <span class="text-muted">&#9734;</span>
                    </p>
                </div>
            </div>
        </div>
    </div>
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
