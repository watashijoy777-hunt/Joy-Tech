<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Pseudo Class</title>

    <style>

       input
       {
        padding: 1px;
        border: 1px solid blue;


       }
       input:focus
       {

        border: 1px solid blue;
        background-color: red;

       }

    </style>
</head>
<body>

    <input type="text" placeholder="Enter Your Name">
    
</body>
</html>
