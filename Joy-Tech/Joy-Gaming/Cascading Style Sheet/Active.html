<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Pseudo Class</title>

    <style>

        button
        {
            background-color: aquamarine;
            width: 150px;
            color: rgb(121, 28, 28);
            padding: 10px;
        }
        button:active
        {
            background-color: blue;
        }
    </style>
</head>
<body>

    <button>Click Me</button>
    
</body>
</html>
