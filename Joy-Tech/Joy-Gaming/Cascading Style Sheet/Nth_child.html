<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nth-child Pseudo Class</title>
    <style>

        li:nth-child(odd)
        {
            background-color: aqua;
        }
        li:nth-child(even)
        {
            background-color: red;
        }
    </style>
</head>
<body>

    <ul>
        <li>1</li>
        <li>2</li>
        <li>3</li>
        <li>4</li>

    </ul>
    
</body>
</html>
