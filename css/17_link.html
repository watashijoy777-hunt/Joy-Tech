<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        a{
            color: blue;
            text-decoration: none;
            font-size: 20px;
        }
        /*when mouse is hover*/
        a:hover{
            color: green;
        }
        /*pseudo class:when clicked*/
        a:active{
            color:red;
        }
    </style>
</head>
<body>
    <a href="#">click me</a>
</body>
</html>
