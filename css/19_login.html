<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>glass loginform</title>
    <style>
        /*background effect*/
        body{
            margin: 0;
            height: 100vh;
            font-family: 'Times New Roman', Times, serif;
            background: linear-gradient(135deg,#667eea,#764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
                }
                /*glass card*/
                .form-box
                {
                    width: 320px;
                    padding: 40px;
                    border-radius: 20px;
                    /*glass effect*/
                    background: rgba(255,255,255,0.1);
                    backdrop-filter: blur(12px);
                    -webkit-backdrop-filter: blur(12px);
                    border: 1px solid rgba(255,255,255,0.3);
                    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
                    color: white;
                    text-align: center;
                }
                /*title*/
                .form-box h2{
                    margin-bottom: 20px;
                }
                /*inputs*/
                input{
                    width: 100%;
                    padding: 12px;
                    margin: 10px 0;
                    border-radius: 10px;
                    border:none;
                    outline: none;
                    background: rgba(255,255,255,0.2);
                    color: white;
                    transition: 0.3s;
                }
                /*input placeholder*/
                input::placeholder
                {
                    color: #eee;
                }
                /*focus effect*/
                input:focus
                {
                    box-shadow: 0 0 10px rgba(255,255,255,0.8);
                }
                button{
                    width: 100%;
                    padding: 12px;
                    margin-top: 15px;
                    border: none;
                    border-radius: 10px;
                    background: rgba(255,255,255,0.2);
                    color: white;
                    cursor: pointer;
                    transition: 0.3s;
                }
                button:hover{
                    background: rgba(255,255,255,0.4);
                    transform: scale(1.05);
                }
                /*extra lighting effect*/
                .form-box:hover{
                    box-shadow: 0 0 25px rgba(255,255,255,0.3);
                }
    </style>
</head>
<body>
    <div class="form-box">
        <h2>login</h2>
        <input type="email" placeholder="email">
        <input type="password" placeholder="password">
        <button>login</button>
    </div>
</body>
</html>
