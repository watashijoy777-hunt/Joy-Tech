<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background:#111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        /*card-design*/
        .card{
            width: 250px;
            height: 150px;
            background: #222;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            border-radius: 15px;
            transition:all 0.4s ease;
        }
        .card:hover{
            transform: scale(1.1)rotate(3deg);
            background: linear-gradient(135deg,#00ffcc,#3366ff);
            box-shadow: 0 0 20px #00ffcc,
                        0 0 40px #3366ff,
                        0 0 60px #00ffcc;
                        cursor: pointer;
        }

    </style>
</head>
<body>
    <div class="card">hover me</div>
</body>
</html>
